services:
  # Backend Web Service
  - type: web
    name: dailylist-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dailylist-db
          property: connectionString
      - key: RAZORPAY_KEYID
        value: rzp_test_SgTkNtGzvPwqYn
      - key: RAZORPAY_KEY_SECRET
        value: n6jFf00kJ5xjIatCwEuw3To8
      - key: GOOGLE_CLIENT_ID
        sync: false # Set manually in Render Dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false # Set manually in Render Dashboard
      - key: GOOGLE_CALLBACK_URL
        sync: false # Set manually to: https://YOUR-RENDER-URL.onrender.com/auth/google/callback
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: dailylist-db
    plan: free
