services:
  # Backend Web Service
  - type: web
    name: dailylist-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dailylist-db
          property: connectionString
      - key: RAZORPAY_KEYID
        sync: false # Set manually in dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false # Set manually in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: dailylist-db
    plan: free
