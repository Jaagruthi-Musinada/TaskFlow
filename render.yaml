services:
  # Backend Web Service
  - type: web
    name: dailylist-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dailylist-db
          property: connectionString
      - key: RAZORPAY_KEYID
        sync: false # Set manually in Render Dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false # Set manually in Render Dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false # Set manually in Render Dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false # Set manually in Render Dashboard
      - key: GOOGLE_CALLBACK_URL
        sync: false # Set manually to: https://YOUR-RENDER-URL.onrender.com/auth/google/callback
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: dailylist-redis
          property: connectionString

databases:
  - name: dailylist-db
    plan: free

redis:
  - name: dailylist-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
